<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spark" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4285F4"/>
      <stop offset="0.5" stop-color="#9B72CB"/>
      <stop offset="1" stop-color="#D96570"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="#131314"/>
  <rect width="260" height="800" fill="#1E1F20"/>

  <g stroke="#9AA0A6" stroke-width="2" stroke-linecap="round">
    <line x1="24" y1="34" x2="44" y2="34"/>
    <line x1="24" y1="42" x2="44" y2="42"/>
    <line x1="24" y1="50" x2="44" y2="50"/>
  </g>
  <rect x="20" y="74" width="150" height="40" rx="20" fill="#333537"/>
  <g stroke="#E3E3E3" stroke-width="2" stroke-linecap="round">
    <line x1="40" y1="94" x2="52" y2="94"/>
    <line x1="46" y1="88" x2="46" y2="100"/>
  </g>
  <text x="64" y="99" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#E3E3E3">New chat</text>
  <text x="24" y="150" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#9AA0A6">Recent</text>
  <rect x="14" y="172" width="232" height="30" rx="15" fill="#2A2B2D"/>
  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#BDC1C6">
    <text x="28" y="192">Getting started with the SDK</text>
    <text x="28" y="228">Pricing question</text>
    <text x="28" y="264">Refactor plan</text>
    <text x="28" y="300">Weekend trip ideas</text>
  </g>

  <text x="296" y="49" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#E3E3E3">Gemini</text>
  <rect x="392" y="26" width="116" height="32" rx="16" fill="#1E1F20"/>
  <text x="410" y="47" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#BDC1C6">2.5 Flash</text>
  <path d="M486 40 l5 5 l5 -5" stroke="#BDC1C6" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1232" cy="42" r="18" fill="#5B6CFF"/>

  <rect x="806" y="104" width="434" height="48" rx="24" fill="#1E1F20"/>
  <text x="830" y="134" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#E3E3E3">How do I get started with the SDK?</text>

  <g transform="translate(300,203)">
    <path d="M14 0 C16 10 18 12 28 14 C18 16 16 18 14 28 C12 18 10 16 0 14 C10 12 12 10 14 0 Z" fill="url(#spark)"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="21">
    <text x="344" y="224" fill="#E3E3E3">Here’s a quick way to get started:</text>
    <rect x="342" y="244" width="272" height="32" rx="6" fill="#2D4B86"/>
    <text x="356" y="266" fill="#FFFFFF">initialize your first instance</text>
    <text x="626" y="266" fill="#E3E3E3">— with one call.</text>
  </g>

  <!-- comment popover -->
  <rect x="392" y="306" width="380" height="196" rx="14" fill="#000000" opacity="0.35"/>
  <rect x="388" y="300" width="380" height="196" rx="14" fill="#1E1F20" stroke="#3C4043"/>
  <rect x="408" y="322" width="3" height="22" rx="1.5" fill="#818CF8"/>
  <text x="420" y="338" font-family="Arial, Helvetica, sans-serif" font-size="15" font-style="italic" fill="#9AA0A6">“initialize your first instance”</text>
  <rect x="408" y="356" width="340" height="64" rx="8" fill="#131314" stroke="#3C4043"/>
  <text x="424" y="382" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#E3E3E3">Does this work in the browser, or Node</text>
  <text x="424" y="406" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#E3E3E3">only?</text>
  <text x="408" y="465" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9AA0A6">⌘ / Ctrl + Enter</text>
  <rect x="560" y="450" width="78" height="32" rx="8" fill="none" stroke="#3C4043"/>
  <text x="599" y="471" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#E3E3E3">Cancel</text>
  <rect x="648" y="450" width="92" height="32" rx="8" fill="#1A73E8"/>
  <text x="694" y="471" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Add</text>

  <rect x="300" y="700" width="940" height="58" rx="29" fill="#1E1F20" stroke="#3C4043"/>
  <g stroke="#9AA0A6" stroke-width="2" stroke-linecap="round">
    <line x1="328" y1="729" x2="344" y2="729"/>
    <line x1="336" y1="721" x2="336" y2="737"/>
  </g>
  <text x="362" y="735" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#9AA0A6">Ask Gemini</text>
  <text x="1086" y="734" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#BDC1C6">Thinking</text>
  <path d="M1162 726 l5 5 l5 -5" stroke="#BDC1C6" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(1196,713)" stroke="#BDC1C6" stroke-width="2" fill="none">
    <rect x="6" y="2" width="12" height="18" rx="6"/>
    <path d="M2 14 a10 10 0 0 0 20 0" stroke-linecap="round"/>
    <line x1="12" y1="24" x2="12" y2="30" stroke-linecap="round"/>
  </g>
